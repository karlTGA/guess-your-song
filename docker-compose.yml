services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/guess-your-song
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - UPLOAD_DIR=/app/uploads
      - WEB_DIST_DIR=/app/packages/web/dist
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo

volumes:
  mongo-data:
  uploads:
